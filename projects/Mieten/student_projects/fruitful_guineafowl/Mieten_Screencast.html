]

---











### Die Daten


- Es werden Zensusdaten aus dem Jahr 2022 verwendet, welche 10786 Gemeinden umfassen
--

- ursprünglicher Datensatz beinhaltet 51 Variablen:
  - Durchschnittliche Nettokaltmiete (€/m²)
  - Leerstandsquote (%)
  - Eigentümerquote (%)
  - Durchschnittliche Wohnfläche (m²)
  - Gesamtbevölkerung
  - Gesamte Anzahl an Wohnungen
  - Anzahl der Wohnungen pro Baujahrsgruppe
  - demografische Informationen, wie z.B. die Anzahl der Personen pro Altersgruppe, Informationen zum Familienstand, der Einwanderungshistorie und Staatsangehörigkeit
--
  
- die Werte all dieser Variablen je Gemeinde stellt eine Beobachtung dar

### Untersuchung des Zusammenhangs von ausgewählten Größen mit der durchschnittlichen Nettokaltmiete

.pull-left[
&lt;img src="Mieten_Screencast_files/figure-html/unnamed-chunk-6-1.png" style="display: block; margin: auto;" /&gt;
]

--

- Besonders stark scheinen vorallem die Variablen der Leerstandsquote je Gemeinde und der Anteil alter Wohnungen je Gemeinde auf die durchschnittliche Nettokaltmiete einfluss zu nehmen
--

- Bei einer geringen Leestandsquote ist die Nettokaltmiete relativ hoch. Dies weißt auf ein typisches Nachfrage-Preis-Verhältniss hin. Gibt es weniger freie Wohnungen, sind potentielle Mieter dazu bereit deutlich höhere Preise zu zahlen
--

- Bei einem großen Anteil an neuen Wohnungen in der Gemeinde sind die durchschnittlichen Nettokaltmieten auch höher. Potentielle Mieter sind meist eher bereit höhere Preise für neue Wohnungen zu bezahlen, da diese einige Vorteile gegenüber alten Wohungen haben

--

- Die Verteilung in Düsseldorf zeigt einen Peak in den Baujahrsgruppen "1950-1959" und "1960-1969", was auf eine starke Bautätigkeit zwischen 1950 und 1969 hinweist
--

- Die Verteilung in Stuttgart ist relativ ausgewogen. Auffällig ist der moderate Rückgang im Anteil neuer Wohnungen, was auf eine relativ konstante Bautätigkeit schließen lässt
--

- Ulm zeigt einen deutlich höheren Anteil an modernen Wohnungen im Vergleich zu den anderen Städten. Dies könnte auf eine jüngere Stadtstruktur und eine höhere Bautätigkeit in den letzten Jahrzehnten hindeuten

- Das Alter der Wohnungen scheint einen Einfluss auf die Mietpreise zu haben, da Wohnungen in Städten mit einem höheren Anteil an alten Gebäuden tendenziell niedrigere Mietpreise aufweisen
--

- Beispielsweise hat Chemnitz den höchsten Anteil an alten Wohnungen (41,03%) und den niedrigsten Quadratmeterpreis (5,26 Euro)

---


- Allerdings gibt es auch Beispiele in der Tabelle, die auf das Gegenteil hinweisen, wie zum Beispiel Stuttgart, wo trotz eines noch relativ hohem Anteil an alten Wohnungen (31,33%) die Quadratmetermiete mit 10,39 Euro am höchsten ist
--

- Dies deutet darauf hin, dass das Alter der Wohnungen zwar eine Rolle spielen kann, aber nicht zwangsweiße der ausschlaggebende Faktor für die Mietpreise ist
--

- Der Anteil deutscher Bürger ist in allen Ost-Städten (durchschnittlich 87.13) höher als in den Weststädten (durchschnittlich 76.59)
--

- Die durchnittliche Fläche der Wohnungen ist hingegen in allen West-Städten (durchschnittlich 81.65) höher als in den Ost-Städten (durchschnittlich 71.93)
--

- Ein Großteil der Faktoren, die die Unterschiede in den Mietpreisen zwischen Ost und West erklären, sind historischer Natur und beruhen auf der deutschen Teilung in die BRD und die damalige DDR

- Die sehr einheitliche Färbung der Städte Chemnitz und Dresden stellen einen Kontrast zu der "bunteren" Einfärbung der Städte Ulm und Stuttgart dar
--

- Die Mieten sind in Chemnitz und Dresden also ortsunabhänig relativ konsistent. Es gibt dort also sogut wie keine Segregation in Bezug auf die Mieten
--

- Hingegen ist eine solche Segregation durchaus in Ulm und Stuttgart vorzufinden, welche oft zu sozialer Ungleichheit führt
--

- Geografische oder infrastrukturelle Faktoren können massive Auswirkungen auf die Mietpreise haben, z.B sind zentral gelegene Wohnungen mit guter Verkehrsanbindung aufgrund hoher Nachfrage oft teurer
--

- Die quasi einheitliche Färbung in den Oststädten könnte ein Zeichen für die homogene Nachfrage an Wohnungen sein

### Verteilung der Leerstandsquoten auf Stadtteile


.pull-left[
![](Mieten_Screencast_files/figure-html/unnamed-chunk-12-1.png)&lt;!-- --&gt;
]

--

- Die Leerstandsquote in Ulm und Stuttgart liegt zum größten Teil unter 2%. Nur in Stuttgart gibt es zentral einen Fleck, in dem die Leerstandsquote zu großen Teilen zwischen 2% und 4% liegt
--

- In Chemnitz und Dresden ist die Leerstandsquote generell höher. In Dresden liegt sie in großen Teilen zwischen 2 und 4% und vereinzelt auch zwischen 4 und 6%
--

- In Chemnitz ist sie sogar noch höher. Hier lassen sich vorallem zentral sehr hohe Leerstandsquoten festellen
--

- Die Stadtteile in denen die Leerstandsquote höher ist, sind möglicherweise nicht so attraktiv für Mieter, was an der schlechten Infrastruktur liegen könnte
--

- Auffällig ist, dass trotz niedrigerer Mieten die Leerstandsquoten in den Städten in Ostdeutschland höher sind als die in den westlichen Städten
--

- Um gegen hohe Leerstandsquoten vorzugehen, kann die Stadt beispielsweise die Infrastruktur ausbauen, aber auch die Wohnungen selbst können durch Sanierung attraktiver gemacht werden

--

- Währendessen liegt der größte Teil der Wohnungen im Ostalbkreis und im Alb-Donau-Kreis zwischen den Baujahrgruppen 04-07. Auch in den neuen Baujahrgruppen (08-10) haben die beiden Kreise einen deutlich größeren Anteil als Stuttgart
--

- In Städten wie Stuttgart gibt es oft eine relativ hohe Bebauungsdichte, wodurch es nur beschränkt Möglichkeiten gibt neue Gebäude zu errichten
--

- Dies ist auf dem Land in der Regel nicht der Fall, da es dort genügend freie Flächen gibt für Neubauten
--

- Politische Maßnahmen könnten helfen, dass auch in Großstädten mehr neue Wohnungen erbaut werden
--

- Um gegen das Problem der Knappheit an neuen Bauflächen in Städten wie Stuttgart vorzugehen könnte man Brachen nutzen, bestehende Bauten aufstocken und Gewerbeflächen zu Wohnflächen umbauen
